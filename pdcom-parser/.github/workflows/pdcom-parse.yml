name: PDCom parser

on:
  workflow_dispatch:
    inputs:
      commune_bfs:
        description: "Single commune_bfs to extract (empty = all)"
        required: false
      min_confidence:
        description: "Minimum georef confidence (default 0.5)"
        required: false
        default: "0.5"
  schedule:
    - cron: "0 6 1 */3 *"   # quarterly (1st of Jan/Apr/Jul/Oct at 06:00 UTC)

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    defaults:
      run:
        working-directory: pdcom-parser
    env:
      LAMAP_DB_URL: ${{ secrets.LAMAP_DB_URL }}
      RELLM_DB_URL: ${{ secrets.RELLM_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Tests
        run: |
          python scripts/bootstrap_fixtures.py
          pytest tests/ -v

      - name: Download PDCom PDFs from Supabase storage
        run: |
          mkdir -p data/pdfs
          # TODO: wire Supabase storage bucket fetch here, or provide PDFs via artifact upload
          echo "PDFs directory ready at data/pdfs/"

      - name: Run pipeline
        if: hashFiles('data/pdfs/*.pdf') != ''
        run: |
          if [ -n "${{ github.event.inputs.commune_bfs }}" ]; then
            pdcom ingest --pdf-dir data/pdfs/
            pdcom export-boundaries
            pdcom extract --commune-bfs ${{ github.event.inputs.commune_bfs }} --min-confidence ${{ github.event.inputs.min_confidence }}
            pdcom load
            pdcom distribute
          else
            pdcom run-all --pdf-dir data/pdfs/ --min-confidence ${{ github.event.inputs.min_confidence || '0.5' }}
          fi
          pdcom report > run_summary.txt
          cat run_summary.txt

      - name: Upload output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pdcom-output
          path: pdcom-parser/data/output/
          retention-days: 14
