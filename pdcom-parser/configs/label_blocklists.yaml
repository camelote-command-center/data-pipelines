# PDCom v0.4: label-quality config. Used by parser and silver matview.
# Applied AFTER feature extraction, BEFORE silver materialization.

# Regex patterns that match a "garbage" label — drop these at extraction time.
# Patterns are applied with re.search() against the cleaned label.
garbage_label_patterns:
  # Pure numbers / percentages / measurements (e.g. "38%", "5% à 0%", "10 à 25 cm")
  - '^\s*\d+(?:[\.,]\d+)?\s*(?:%|cm|m|m2|m²)?(?:\s*à\s*\d+(?:[\.,]\d+)?\s*(?:%|cm|m|m2|m²)?)?\s*$'
  # Lone right-paren/bracket (e.g. "Zone 5)")
  - '^[\)\]]\s*$'
  # Lone left-paren with little after
  - '^\s*[\(\[].{0,3}$'

# Place / neighborhood names that get captured as legend labels — drop them.
# Lowercase comparison (after _strip_accents).
# Generally specific to GE; expand as new ones are discovered.
