# Theme override map. If the label matches a regex (case-insensitive),
# force the theme to the given value, overriding the page-level classification.
# Applied after page-level classify_theme().
theme_overrides:
  elements_naturels:
    - '\b(?:foret|forets|bois|bosquet|bosquets|arborisation|chene|chenes|hetre|tilleul|erable|peuplier|saule|saules)\b'
    - '\b(?:vegetation|haie|haies|arbre|arbres|verger|vergers|cordon\s+boise|continuite\s+vegetale)\b'
  mobilite:
    - '\b(?:pieton|pietons|cycliste|cyclistes|cheminement|axe\s+routier|voirie|tpg|tram|bus|gare|halte)\b'
  affectation:
    - '\b(?:plq|zone\s+a\s+batir|zone\s+a\s+batir|secteur\s+d.acquisition|perimetre\s+de\s+developpement|zone\s+de\s+developpement)\b'
  patrimoine_bati:
    - '\b(?:monument|patrimoine|recensement|releve|isos|icomos|classe|classee|inventaire|protege|protegee)\b'

# Conservative typo fixes applied at silver. Only unambiguous, documented typos.
typo_fixes:
  - { pattern: '\bRésau\b', replacement: 'Réseau' }
  - { pattern: '\brésau\b', replacement: 'réseau' }
