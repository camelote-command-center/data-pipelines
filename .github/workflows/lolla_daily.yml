name: Lolla Daily Scraper

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      seed_mode:
        description: 'Seed mode (initial 80% scrape)'
        required: false
        default: '0'
        type: choice
        options:
          - '0'
          - '1'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd pipelines/_shared && npm ci
      - run: cd pipelines/lolla-daily && npm ci
      - name: Scrape Lolla.ch
        run: cd pipelines/lolla-daily && npx tsx fetch-lolla.ts
        env:
          SUPABASE_URL: ${{ secrets.XOXO_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.XOXO_SUPABASE_SERVICE_KEY }}
          CMD_SUPABASE_URL: ${{ secrets.CMD_SUPABASE_URL }}
          CMD_SUPABASE_KEY: ${{ secrets.CMD_SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATASET_ID: ${{ secrets.LOLLA_DATASET_ID }}
          SEED_MODE: ${{ github.event.inputs.seed_mode || '0' }}
      - name: Update dataset metadata
        if: always()
        run: |
          curl -s -X PATCH "$CMD_URL/rest/v1/datasets?workflow_file=eq.lolla_daily.yml" \
            -H "apikey: $CMD_KEY" -H "Authorization: Bearer $CMD_KEY" \
            -H "Content-Type: application/json" -H "Prefer: return=minimal" \
            -d "{\"last_acquired_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"last_error\":null}"
        env:
          CMD_URL: ${{ secrets.CAMELOTE_DATA_SUPABASE_URL }}
          CMD_KEY: ${{ secrets.CAMELOTE_DATA_SUPABASE_SERVICE_KEY }}
