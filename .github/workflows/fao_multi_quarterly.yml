name: FAO Multi — Sparse (quarterly)

# Low-volume rubriques (<1 publication/day on average): scrape quarterly with
# a 100-day lookback (full quarter + buffer for late publications).
#
# Bucket source: 14-day sample taken 2026-04-27 — these averaged <1 row/day,
# many had zero. Refine after fao_multi_backfill.yml completes if real
# frequencies differ.

on:
  schedule:
    # Quarterly: 1st of Jan/Apr/Jul/Oct at 05:30 UTC
    - cron: '30 5 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      rubrique:
        description: 'Single rubrique to fetch (leave blank to run the full matrix)'
        required: false
        type: string
      days_back:
        description: 'Lookback window in days (default 100)'
        required: false
        default: '100'
        type: string

jobs:
  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      rubriques: ${{ steps.set.outputs.rubriques }}
    steps:
      - id: set
        run: |
          if [ -n "${{ inputs.rubrique }}" ]; then
            echo "rubriques=[${{ inputs.rubrique }}]" >> "$GITHUB_OUTPUT"
          else
            echo 'rubriques=[84, 90, 135, 136, 213, 217, 322]' >> "$GITHUB_OUTPUT"
          fi

  fetch:
    needs: resolve-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        rubrique: ${{ fromJson(needs.resolve-matrix.outputs.rubriques) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd pipelines/_shared && npm ci
      - run: cd pipelines/fao-multi && npm ci
      - name: Install Playwright browsers
        run: cd pipelines/fao-multi && npx playwright install chromium --with-deps
      - name: Fetch FAO rubrique ${{ matrix.rubrique }}
        run: cd pipelines/fao-multi && npx tsx fetch-fao.ts
        env:
          RUBRIQUE: ${{ matrix.rubrique }}
          DAYS_BACK: ${{ inputs.days_back || '100' }}
          RE_LLM_SUPABASE_URL: ${{ secrets.RE_LLM_SUPABASE_URL }}
          RE_LLM_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RE_LLM_SUPABASE_SERVICE_ROLE_KEY }}
          # Satisfies pipelines/_shared/supabase.ts import-time check.
          SUPABASE_URL: ${{ secrets.RE_LLM_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RE_LLM_SUPABASE_SERVICE_ROLE_KEY }}
          TWO_CAPTCHA_API_KEY: ${{ secrets.TWO_CAPTCHA_API_KEY }}
