name: FR - Feuille Officielle (Transactions + Permits)

on:
  schedule:
    - cron: '0 4 * * 1'  # Every Monday at 4 AM UTC
  workflow_dispatch:
    inputs:
      year:
        description: 'Year to process (default: current year)'
        required: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd pipelines/fr-feuille-officielle && npm ci
      - name: Fetch transactions
        run: cd pipelines/fr-feuille-officielle && npx tsx fetch-transactions.ts ${{ github.event.inputs.year || '' }}
        env:
          SUPABASE_URL: ${{ secrets.LAMAP_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.LAMAP_SUPABASE_SERVICE_KEY }}
      - name: Fetch building permits
        run: cd pipelines/fr-feuille-officielle && npx tsx fetch-permits.ts ${{ github.event.inputs.year || '' }}
        env:
          SUPABASE_URL: ${{ secrets.LAMAP_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.LAMAP_SUPABASE_SERVICE_KEY }}
