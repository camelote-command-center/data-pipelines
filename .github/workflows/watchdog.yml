name: Watchdog (overdue dataset re-trigger)

# Reliability net for GitHub Actions cron drift / silent skips and any
# workflow that ran successfully but didn't PATCH datasets.last_acquired_at.
#
# Hourly: query camelote_data.datasets, find rows past their per-row
# overdue threshold, and `gh workflow run` the matching workflow_file.
#
# Single source of truth for "overdue" — this matches the dashboard
# exactly:
#   overdue ≡ days_since_update > expected_days_between_updates + delay_threshold_days
#
# Skips if the same workflow already has a queued/in_progress run, to
# avoid double-trigger. Dedupes per sweep so multi-dataset workflows
# (e.g. sitg_urban_programs.yml ↔ 3 datasets) fire once.

on:
  schedule:
    - cron: '17 * * * *'  # every hour at :17 (off-peak minute)
  workflow_dispatch:

permissions:
  actions: write   # needed for `gh workflow run`
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CMD_URL: ${{ secrets.CAMELOTE_DATA_SUPABASE_URL }}
      CMD_KEY: ${{ secrets.CAMELOTE_DATA_SUPABASE_SERVICE_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Sweep stale datasets
        run: |
          set -euo pipefail

          # Pull every active dataset row that has a workflow_file and a
          # configured threshold. Per-row threshold lets us match the
          # dashboard exactly — no separate budget table to drift.
          rows=$(curl -s -H "apikey: $CMD_KEY" -H "Authorization: Bearer $CMD_KEY" \
            "$CMD_URL/rest/v1/datasets?select=code,name,frequency,workflow_file,last_acquired_at,expected_days_between_updates,delay_threshold_days&status=eq.active&workflow_file=not.is.null&frequency=neq.on_demand")

          now=$(date -u +%s)
          declare -A TRIGGERED=()
          stale_count=0
          triggered_count=0

          while read -r row; do
            code=$(jq -r '.code'                         <<<"$row")
            name=$(jq -r '.name'                         <<<"$row")
            wf=$(jq   -r '.workflow_file'                <<<"$row")
            last=$(jq -r '.last_acquired_at // empty'    <<<"$row")
            exp=$(jq  -r '.expected_days_between_updates // 0' <<<"$row")
            thr=$(jq  -r '.delay_threshold_days // 0'    <<<"$row")

            # Skip rows with no threshold config — can't decide overdue.
            if [ "$exp" = "0" ] && [ "$thr" = "0" ]; then continue; fi

            # overdue_seconds = (expected_days + delay_threshold_days) * 86400
            budget=$(( (exp + thr) * 86400 ))

            if [ -z "$last" ]; then
              # never_run: surface but don't trigger blindly (could be a not-yet-built parser)
              echo "NEVER_RUN: $code ($name) wf=$wf — surfacing only, not triggering"
              continue
            fi

            last_ts=$(date -u -d "$last" +%s 2>/dev/null || echo 0)
            age=$(( now - last_ts ))
            if [ "$age" -lt "$budget" ]; then continue; fi

            stale_count=$((stale_count + 1))
            age_days=$(( age / 86400 ))
            budget_days=$(( budget / 86400 ))
            echo "STALE: $code ($name) — age=${age_days}d threshold=${budget_days}d wf=$wf"

            # Dedupe: only trigger each workflow_file once per sweep
            if [ -n "${TRIGGERED[$wf]:-}" ]; then
              echo "  already triggered $wf this sweep — skipping"
              continue
            fi

            # Skip if a run for this workflow is already queued/in_progress
            active=$(gh run list --workflow="$wf" --limit=5 \
              --json status --jq '[.[] | select(.status=="queued" or .status=="in_progress")] | length')
            if [ "$active" -gt 0 ]; then
              echo "  $wf already running ($active active) — skipping"
              TRIGGERED[$wf]=1
              continue
            fi

            echo "  triggering: gh workflow run $wf"
            if gh workflow run "$wf"; then
              triggered_count=$((triggered_count + 1))
              TRIGGERED[$wf]=1
            else
              echo "  trigger FAILED for $wf"
            fi
          done < <(echo "$rows" | jq -c '.[]')

          echo "Sweep complete: $stale_count stale row(s), $triggered_count workflow(s) triggered"
