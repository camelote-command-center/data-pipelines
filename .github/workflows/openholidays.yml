name: OpenHolidays

# Public + school holidays for CH, ±2 years window. Quarterly cron.

on:
  schedule:
    - cron: '15 5 1 1,4,7,10 *'   # Quarterly 1st 05:15 UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd pipelines/_shared && npm ci
      - run: cd pipelines/openholidays && npm ci
      - name: Fetch OpenHolidays
        run: cd pipelines/openholidays && npx tsx fetch-openholidays.ts
        env:
          RE_LLM_SUPABASE_URL: ${{ secrets.RE_LLM_SUPABASE_URL }}
          RE_LLM_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RE_LLM_SUPABASE_SERVICE_ROLE_KEY }}
