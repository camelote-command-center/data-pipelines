name: NE - Building Permits (SITN WFS)

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3 AM UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd pipelines/ne-sad-sitn && npm ci
      - run: cd pipelines/ne-sad-sitn && npx tsx fetch-permits.ts
        env:
          SUPABASE_URL: ${{ secrets.LAMAP_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.LAMAP_SUPABASE_SERVICE_KEY }}
