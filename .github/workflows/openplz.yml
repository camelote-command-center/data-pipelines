name: OpenPLZ

# Swiss postal-code / address taxonomy from openplzapi.org.
# Annual cron — the underlying data (cantons/communes/localities) changes rarely.

on:
  schedule:
    - cron: '0 5 1 1 *'   # 1 January 05:00 UTC
  workflow_dispatch:
    inputs:
      only_canton:
        description: 'Restrict to one canton key (e.g. 25 for GE) — leave blank for all'
        required: false
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd pipelines/_shared && npm ci
      - run: cd pipelines/openplz && npm ci
      - name: Fetch OpenPLZ
        run: cd pipelines/openplz && npx tsx fetch-openplz.ts
        env:
          ONLY_CANTON: ${{ inputs.only_canton }}
          RE_LLM_SUPABASE_URL: ${{ secrets.RE_LLM_SUPABASE_URL }}
          RE_LLM_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RE_LLM_SUPABASE_SERVICE_ROLE_KEY }}
