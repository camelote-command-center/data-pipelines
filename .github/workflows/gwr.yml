name: GWR Import

on:
  schedule:
    - cron: '0 2 1 1,4,7,10 *'  # quarterly: 1st of Jan/Apr/Jul/Oct at 2:00 UTC
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python pipelines/gwr/import.py
        env:
          LAMAP_SUPABASE_URL: ${{ secrets.LAMAP_SUPABASE_URL }}
          LAMAP_SUPABASE_SERVICE_KEY: ${{ secrets.LAMAP_SUPABASE_SERVICE_KEY }}
          LAMAP_SCHEMA: bronze
          CAMELOTE_SUPABASE_URL: ${{ secrets.CAMELOTE_DATA_SUPABASE_URL }}
          CAMELOTE_SUPABASE_KEY: ${{ secrets.CAMELOTE_DATA_SUPABASE_SERVICE_KEY }}
