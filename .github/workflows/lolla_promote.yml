name: Lolla Daily Promotion

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC (2h after scraper)
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of ads to promote (default 25)'
        required: false
        default: '25'
        type: string
      fix_existing:
        description: 'Re-sync already promoted listings (fix missing data)'
        required: false
        default: '0'
        type: choice
        options:
          - '0'
          - '1'

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd pipelines/_shared && npm ci
      - run: cd pipelines/lolla-daily && npm ci
      - name: Promote lolla ads to listings
        run: cd pipelines/lolla-daily && npx tsx promote.ts
        env:
          SUPABASE_URL: ${{ secrets.XOXO_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.XOXO_SUPABASE_SERVICE_KEY }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '25' }}
          FIX_EXISTING: ${{ github.event.inputs.fix_existing || '0' }}
