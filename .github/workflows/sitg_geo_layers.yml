name: SITG Geo Layers Import
on:
  schedule:
    - cron: '0 5 1 * *'   # Monthly 1st at 05:00 UTC
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python pipelines/sitg_geo_layers/import.py
        env:
          LAMAP_SUPABASE_URL: ${{ secrets.LAMAP_SUPABASE_URL }}
          LAMAP_SUPABASE_SERVICE_KEY: ${{ secrets.LAMAP_SUPABASE_SERVICE_KEY }}
          LAMAP_SCHEMA: bronze
