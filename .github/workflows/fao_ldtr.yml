name: FAO LDTR

on:
  schedule:
    - cron: '30 4 * * 6'  # Weekly Saturday at 04:30 UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd pipelines/_shared && npm ci
      - run: cd pipelines/fao-ldtr && npm ci
      - name: Install Playwright browsers
        run: cd pipelines/fao-ldtr && npx playwright install chromium --with-deps
      - name: Fetch FAO LDTR records
        run: cd pipelines/fao-ldtr && npx tsx fetch-ldtr.ts
        env:
          SUPABASE_URL: ${{ secrets.LAMAP_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.LAMAP_SUPABASE_SERVICE_KEY }}
          TWO_CAPTCHA_API_KEY: ${{ secrets.TWO_CAPTCHA_API_KEY }}
      - name: Update dataset metadata
        if: always()
        run: |
          COUNT=$(curl -s -H "apikey: $KEY" -H "Authorization: Bearer $KEY" \
            -H "Accept-Profile: bronze" -H "Prefer: count=estimated" \
            --head "$URL/rest/v1/FAO_LDTR?select=*" \
            | grep -i content-range | sed 's|.*/||' | tr -d '\r')
          curl -s -X PATCH "$CMD_URL/rest/v1/datasets?code=eq.ge_fao_ldtr" \
            -H "apikey: $CMD_KEY" -H "Authorization: Bearer $CMD_KEY" \
            -H "Content-Type: application/json" -H "Prefer: return=minimal" \
            -d "{\"last_acquired_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"record_count\":${COUNT:-0},\"last_error\":null}"
        env:
          URL: ${{ secrets.LAMAP_SUPABASE_URL }}
          KEY: ${{ secrets.LAMAP_SUPABASE_SERVICE_KEY }}
          CMD_URL: ${{ secrets.CAMELOTE_DATA_SUPABASE_URL }}
          CMD_KEY: ${{ secrets.CAMELOTE_DATA_SUPABASE_SERVICE_KEY }}
