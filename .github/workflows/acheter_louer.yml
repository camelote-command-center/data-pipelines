name: AcheterLouer (Listings)

on:
  # Schedule disabled 2026-04-27 — Webshare residential proxy bandwidth
  # exhausted; cron re-enabled once quota is topped up / resets.
  # schedule:
  #   - cron: '0 2 * * *'  # Daily at 02:00 UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd pipelines/_shared && npm ci
      - run: cd pipelines/acheter-louer && npm ci
      - name: Install Playwright browsers
        run: cd pipelines/acheter-louer && npx playwright install chromium --with-deps
      - name: Fetch AcheterLouer listings
        run: cd pipelines/acheter-louer && npx tsx fetch-listings.ts
        env:
          RE_LLM_SUPABASE_URL: ${{ secrets.RE_LLM_SUPABASE_URL }}
          RE_LLM_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RE_LLM_SUPABASE_SERVICE_ROLE_KEY }}
          # Residential proxy required — Cloudflare JA3 fingerprinting blocks datacenter IPs
          WEBSHARE_RESIDENTIAL_USER: ${{ secrets.WEBSHARE_RESIDENTIAL_USER }}
          WEBSHARE_RESIDENTIAL_PASS: ${{ secrets.WEBSHARE_RESIDENTIAL_PASS }}
          WEBSHARE_RESIDENTIAL_HOST: ${{ secrets.WEBSHARE_RESIDENTIAL_HOST }}
      - name: Update dataset metadata
        if: always()
        run: |
          COUNT=$(curl -s -H "apikey: $KEY" -H "Authorization: Bearer $KEY" \
            -H "Accept-Profile: bronze_ch" -H "Prefer: count=estimated" \
            --head "$URL/rest/v1/acheter_louer?select=*" \
            | grep -i content-range | sed 's|.*/||' | tr -d '\r')
          curl -s -X PATCH "$CMD_URL/rest/v1/datasets?code=eq.ext_acheterlouer" \
            -H "apikey: $CMD_KEY" -H "Authorization: Bearer $CMD_KEY" \
            -H "Content-Type: application/json" -H "Prefer: return=minimal" \
            -d "{\"last_acquired_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"record_count\":${COUNT:-0},\"last_error\":null}"
        env:
          URL: ${{ secrets.RE_LLM_SUPABASE_URL }}
          KEY: ${{ secrets.RE_LLM_SUPABASE_SERVICE_ROLE_KEY }}
          CMD_URL: ${{ secrets.CAMELOTE_DATA_SUPABASE_URL }}
          CMD_KEY: ${{ secrets.CAMELOTE_DATA_SUPABASE_SERVICE_KEY }}
