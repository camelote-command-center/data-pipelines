name: UK Price Paid Monthly Update

on:
  schedule:
    - cron: '0 6 5 * *' # 5th of every month at 06:00 UTC
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd pipelines/uk-price-paid && npm ci

      - name: Run monthly ingestion
        run: cd pipelines/uk-price-paid && npx tsx src/index.ts
        env:
          SUPABASE_URL: ${{ secrets.RE_LLM_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RE_LLM_SUPABASE_SERVICE_ROLE_KEY }}
