name: Immobilier (Listings)

on:
  schedule:
    - cron: '30 8 * * *'  # Daily at 08:30 UTC (09:30 CET)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 600
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd pipelines/_shared && npm ci
      - run: cd pipelines/immobilier && npm ci
      - name: Fetch Immobilier listings
        run: cd pipelines/immobilier && npx tsx fetch-listings.ts
        env:
          SUPABASE_URL: ${{ secrets.LAMAP_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.LAMAP_SUPABASE_SERVICE_KEY }}
          WEBSHARE_PROXY_USER: ${{ secrets.WEBSHARE_PROXY_USER }}
          WEBSHARE_PROXY_PASS: ${{ secrets.WEBSHARE_PROXY_PASS }}
