name: Immobilier (Listings)

on:
  schedule:
    - cron: '30 1 * * *'  # Daily at 01:30 UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd pipelines/immobilier && npm ci
      - name: Fetch Immobilier listings
        run: cd pipelines/immobilier && npx tsx fetch-listings.ts
        env:
          SUPABASE_URL: ${{ secrets.LAMAP_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.LAMAP_SUPABASE_SERVICE_KEY }}
