name: news-rss

# Daily Swiss news aggregator. Walks each feed in pipelines/news-rss/feeds.ts,
# fetches new article URLs, extracts the body, lands one row per article in
# knowledge_ch.documents (categorization handled by the AFTER INSERT trigger).

on:
  schedule:
    - cron: '0 4 * * *'    # daily 04:00 UTC
  workflow_dispatch:
    inputs:
      only_feed:
        description: 'Single feed slug (leave blank to walk all)'
        required: false
        type: string
      max_items:
        description: 'Cap per-feed items this run'
        required: false
        default: '50'
        type: string
      dry_run:
        description: 'Preview only (no DB writes)'
        required: false
        default: 'false'
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd pipelines/_shared && npm ci
      - run: cd pipelines/news-rss && npm ci
      - name: Fetch news
        run: cd pipelines/news-rss && npx tsx fetch-news.ts
        env:
          ONLY_FEED: ${{ inputs.only_feed }}
          MAX_ITEMS_PER_FEED: ${{ inputs.max_items || '50' }}
          DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '' }}
          RE_LLM_SUPABASE_URL: ${{ secrets.RE_LLM_SUPABASE_URL }}
          RE_LLM_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RE_LLM_SUPABASE_SERVICE_ROLE_KEY }}
